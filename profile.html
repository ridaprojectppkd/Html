<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Rida</title>

    <!-- Lottie Player -->
    <script src="lottie.asset/linkedin.json"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2ff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .profile-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 320px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #4c6ef5;
        }

        h1 {
            margin: 15px 0 5px;
            color: #333;
        }

        .bio {
            color: #666;
            font-size: 14px;
        }

        .lottie-box {
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <div class="profile-card">

        <img src="Rida.png" alt="Foto Rida" class="profile-img">

        <h1>Rida</h1>

        <p class="bio">
            Hello! I am Rida. Welcome to my simple profile page.
        </p>

        <div class="lottie-box">
            <lottie-player src="lottie.asset/linkedin.json" background="transparent" speed="1"
                style="width:180px;height:180px" loop autoplay>
            </lottie-player>
        </div>

    </div>

</body>

</html>
